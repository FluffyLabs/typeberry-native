name: Create draft release

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: draft-release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  create-draft:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Verify release version
        id: version
        env:
          RELEASE_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          package_version=$(node -p "require('./package.json').version")
          branch_version="${RELEASE_BRANCH#release/v}"

          if [ "$package_version" != "$branch_version" ]; then
            echo "::error::Package version $package_version does not match release branch version $branch_version"
            exit 1
          fi

          echo "version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: true
          prerelease: false
