name: Publish

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: publish-${{ github.event_name }}-${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - name: Verify release version
        if: github.event_name == 'release'
        run: |
          tag="${{ github.event.release.tag_name }}"
          package_version=$(node -p "require('./package.json').version")

          if [ "$tag" != "v$package_version" ]; then
            echo "::error::Release tag $tag does not match package version v$package_version"
            exit 1
          fi

  build-wasm:
    needs: verify-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build WASM library
        run: npm run build --workspaces --if-present
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wasm-build
          path: |
            bandersnatch/wasm-binding/pkg/
            ed25519/pkg/
            reed-solomon/pkg/

  build-native:
    needs: verify-source
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            package: darwin-arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: linux-x64-gnu

    runs-on: ${{ matrix.settings.host }}
    name: Build native - ${{ matrix.settings.target }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Build
        run: npm run build:native --workspaces --if-present -- ${{ matrix.settings.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: bandersnatch/npm/${{ matrix.settings.package }}/*.node
          if-no-files-found: error

  publish:
    needs: [verify-source, build-wasm, build-native]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: 'npm'
      - name: Install deps
        run: npm ci

      - name: Download WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: wasm-build
          path: .

      - name: Download darwin-arm64 native
        uses: actions/download-artifact@v8
        with:
          name: bindings-aarch64-apple-darwin
          path: bandersnatch/npm/darwin-arm64/

      - name: Download linux-x64-gnu native
        uses: actions/download-artifact@v8
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: bandersnatch/npm/linux-x64-gnu/

      - name: Build native library bundle
        run: npm run build

      - name: Get short commit SHA
        if: github.event_name == 'push'
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Append commit SHA to snapshot versions
        if: github.event_name == 'push'
        env:
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const shortSha = process.env.SHORT_SHA;

          const distPkg = JSON.parse(fs.readFileSync('dist/package.json'));
          const baseVersion = distPkg.version;
          const snapshotVersion = `${baseVersion}-${shortSha}`;
          distPkg.version = snapshotVersion;

          if (distPkg.optionalDependencies && typeof distPkg.optionalDependencies === 'object') {
            for (const [dep, version] of Object.entries(distPkg.optionalDependencies)) {
              if (version === baseVersion) {
                distPkg.optionalDependencies[dep] = snapshotVersion;
              }
            }
          }
          fs.writeFileSync('dist/package.json', `${JSON.stringify(distPkg, null, 2)}\n`);

          for (const pkgPath of [
            'bandersnatch/npm/darwin-arm64/package.json',
            'bandersnatch/npm/linux-x64-gnu/package.json'
          ]) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath));
            if (pkg.version !== baseVersion) {
              throw new Error(
                `${pkgPath} version ${pkg.version} does not match ${baseVersion}`,
              );
            }
            pkg.version = snapshotVersion;
            fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          EOF

      - name: Publish platform packages
        run: |
          publish_package() {
            local dir="$1"
            local label="$2"

            echo "Publishing ${label} from ${dir}..."
            pushd "$dir" >/dev/null

            publish_output=$(npm publish --access public --tag latest 2>&1)
            status=$?

            if [ $status -ne 0 ]; then
              if echo "$publish_output" | grep -qiE "(previously published versions|already been published|cannot publish over existing version|epublishconflict)"; then
                echo "Package ${label} already published, skipping."
                echo "$publish_output"
              else
                echo "Failed to publish ${label} (exit code ${status})" >&2
                echo "$publish_output" >&2
                popd >/dev/null
                exit $status
              fi
            else
              echo "$publish_output"
            fi

            popd >/dev/null
          }

          publish_package "bandersnatch/npm/darwin-arm64" "darwin-arm64 platform package"
          publish_package "bandersnatch/npm/linux-x64-gnu" "linux-x64-gnu platform package"

      - name: Publish main package
        working-directory: ./dist/
        run: npm publish --access public --tag latest
