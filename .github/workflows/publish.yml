name: Publish

on:
  release:
    types: [published]

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Verify release version
        run: |
          tag="${{ github.event.release.tag_name }}"
          package_version=$(node -p "require('./package.json').version")

          if [ "$tag" != "v$package_version" ]; then
            echo "::error::Release tag $tag does not match package version v$package_version"
            exit 1
          fi

  build-wasm:
    needs: verify-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build WASM library
        run: npm run build --workspaces --if-present
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wasm-build
          path: |
            bandersnatch/wasm-binding/pkg/
            ed25519/pkg/
            reed-solomon/pkg/

  build-native:
    needs: verify-release
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            package: darwin-arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: linux-x64-gnu

    runs-on: ${{ matrix.settings.host }}
    name: Build native - ${{ matrix.settings.target }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Build
        run: npm run build:native --workspaces --if-present -- ${{ matrix.settings.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: bandersnatch/npm/${{ matrix.settings.package }}/*.node
          if-no-files-found: error

  publish:
    needs: [verify-release, build-wasm, build-native]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: 'npm'
      - name: Install deps
        run: npm ci

      - name: Download WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: wasm-build
          path: .

      - name: Download darwin-arm64 native
        uses: actions/download-artifact@v8
        with:
          name: bindings-aarch64-apple-darwin
          path: bandersnatch/npm/darwin-arm64/

      - name: Download linux-x64-gnu native
        uses: actions/download-artifact@v8
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: bandersnatch/npm/linux-x64-gnu/

      - name: Build native library bundle
        run: npm run build

      - name: Publish platform packages
        run: |
          publish_package() {
            local dir="$1"
            local label="$2"

            echo "Publishing ${label} from ${dir}..."
            pushd "$dir" >/dev/null

            publish_output=$(npm publish --access public --tag latest 2>&1)
            status=$?

            if [ $status -ne 0 ]; then
              if echo "$publish_output" | grep -qiE "(previously published versions|already been published|cannot publish over existing version|epublishconflict)"; then
                echo "Package ${label} already published, skipping."
                echo "$publish_output"
              else
                echo "Failed to publish ${label} (exit code ${status})" >&2
                echo "$publish_output" >&2
                popd >/dev/null
                exit $status
              fi
            else
              echo "$publish_output"
            fi

            popd >/dev/null
          }

          publish_package "bandersnatch/npm/darwin-arm64" "darwin-arm64 platform package"
          publish_package "bandersnatch/npm/linux-x64-gnu" "linux-x64-gnu platform package"

      - name: Publish main package
        working-directory: ./dist/
        run: npm publish --access public --tag latest
